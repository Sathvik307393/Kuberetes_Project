# Default values for ai-agent-service.
replicaCount: 1

image:
  repository: ai-agent-service
  pullPolicy: IfNotPresent
  tag: "latest"

# Service account disabled - no RBAC needed
serviceAccount:
  create: false

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 5006
  targetPort: 5006

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Health probes
livenessProbe:
  httpGet:
    path: /health
    port: 5006
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 5006
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: 5006
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

env:
  - name: PORT
    value: "5006"
  - name: AUTH_SERVICE_URL
    value: "http://auth-service:5001"
  - name: LLM_MODEL
    valueFrom:
      configMapKeyRef:
        name: ai-agent-config
        key: llm-model
  - name: GOOGLE_API_KEY
    valueFrom:
      secretKeyRef:
        name: ai-agent-secret
        key: google-api-key
