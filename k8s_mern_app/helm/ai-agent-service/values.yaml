# Default values for ai-agent-service.
replicaCount: 1

strategy:
  type: RollingUpdate
  maxSurge: 1
  maxUnavailable: 0

image:
  repository: ai-agent-service
  pullPolicy: IfNotPresent

container:
  name: ai-agent-service

service:
  type: ClusterIP
  port: 5006
  targetport: 5006

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: 5006
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 5006
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: 5006
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

env:
  - name: PORT
    value: "5006"
  - name: AUTH_SERVICE_URL
    value: "http://auth-service:5001"
  - name: LLM_MODEL
    valueFrom:
      configMapKeyRef:
        name: ai-agent-config
        key: llm-model
  - name: GOOGLE_API_KEY
    valueFrom:
      secretKeyRef:
        name: ai-agent-secret
        key: google-api-key

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

trivy:
  enabled: false
  severity: HIGH,CRITICAL
  scanType: fs
  ignoreUnfixed: false
