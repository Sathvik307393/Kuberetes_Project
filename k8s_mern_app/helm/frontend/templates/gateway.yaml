apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: k-gateway
  namespace: mern
spec:
  gatewayClassName: k-gateway-class
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mern-http-route
  namespace: mern
spec:
  parentRefs:
    - name: k-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /ai
      backendRefs:
        - name: ai
          port: 5001
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: authorization
          port: 5002
    - matches:
        - path:
            type: PathPrefix
            value: /nutrition
      backendRefs:
        - name: nutrition
          port: 5003
    - matches:
        - path:
            type: PathPrefix
            value: /progress
      backendRefs:
        - name: progress
          port: 5004
    - matches:
        - path:
            type: PathPrefix
            value: /workout
      backendRefs:
        - name: workout
          port: 5005
    - matches:
        - path:
            type: PathPrefix
            value: /user
      backendRefs:
        - name: user
          port: 5006
