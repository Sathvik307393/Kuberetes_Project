# Default values for fitforge-frontend.
replicaCount: 1

image:
  repository: fitforge-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

# Service account disabled - no RBAC needed
serviceAccount:
  create: false

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

# Gateway API configuration
gateway:
  enabled: true
  name: fitforge-gateway
  gatewayClassName: nginx
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "3.89.98.213.nip.io"
  httproutes:
    - name: frontend-route
      hostnames:
        - "3.89.98.213.nip.io"
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: fitforge-frontend
              port: 3000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Health probes
livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# NFS Storage Configuration
nfs:
  enabled: true
  server: "13.232.245.215"
  path: "/nfs-storage"
  storageClassName: "mongo-nfs-storage"
  size: "1Gi"
  mountPath: "/app/data"
  accessMode: "ReadWriteMany"

env: []
