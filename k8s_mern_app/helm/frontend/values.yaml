# Default values for fitforge-frontend.
replicaCount: 1

strategy:
  type: RollingUpdate
  maxSurge: 1
  maxUnavailable: 0

image:
  repository: fitforge-frontend
  pullPolicy: IfNotPresent

container:
  name: frontend

service:
  type: ClusterIP
  port: 3000
  targetport: 3000

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

env: []

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

trivy:
  enabled: false
  severity: HIGH,CRITICAL
  scanType: fs
  ignoreUnfixed: false
