# Default values for nutrition-service.
replicaCount: 1

strategy:
  type: RollingUpdate
  maxSurge: 1
  maxUnavailable: 0

image:
  repository: nutrition-service
  pullPolicy: IfNotPresent

container:
  name: nutrition-service

service:
  type: ClusterIP
  port: 5004
  targetport: 5004

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: 5004
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 5004
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health
    port: 5004
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

env:
  - name: PORT
    value: "5004"
  - name: MONGO_URI
    valueFrom:
      secretKeyRef:
        name: mongodb-secret
        key: nutrition-db-uri

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

trivy:
  enabled: false
  severity: HIGH,CRITICAL
  scanType: fs
  ignoreUnfixed: false
